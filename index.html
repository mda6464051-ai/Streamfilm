<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #e50914; --background: #141414; --surface: #1f1f1f; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Tahoma, sans-serif; }
        body { background: var(--background); color: var(--text); padding-bottom: 50px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #000; position: fixed; top:0; width:100%; z-index:1000; }
        .logo { color: var(--primary); font-size: 22px; font-weight: bold; cursor: pointer; }
        .row { margin-bottom: 30px; padding: 0 15px; }
        .row-title { font-size: 18px; margin-bottom: 15px; border-right: 4px solid var(--primary); padding-right: 10px; }
        .row-grid { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .card { min-width: 130px; width: 130px; background: var(--surface); border-radius: 6px; overflow: hidden; cursor: pointer; }
        .poster { width: 100%; height: 170px; object-fit: cover; }
        .card-body { padding: 8px; font-size: 12px; }
        .btn { padding: 8px 15px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; text-decoration: none; justify-content: center; }
        .btn-p { background: var(--primary); color: white; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; overflow-y: auto; padding: 15px; }
        .modal-c { background: var(--surface); max-width: 500px; margin: 40px auto; border-radius: 8px; padding: 15px; position: relative; }
        .admin-panel { position: fixed; bottom: 0; left: 0; width: 100%; height: 80vh; background: #111; z-index: 3000; display: none; padding: 20px; overflow-y: auto; }
        .form-g { margin-bottom: 10px; }
        .form-g input, .form-g select { width: 100%; padding: 8px; background: #222; border: 1px solid #333; color: white; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="logo" id="logoBtn">StreamFlix</div>
        <button class="btn btn-p" id="openAdmin" style="display:none;">مدیریت</button>
    </header>

    <div id="content" style="margin-top: 80px;"></div>

    <div class="modal" id="modal">
        <div class="modal-c">
            <h3 id="mTitle"></h3>
            <p id="mDesc" style="font-size:13px; color:#aaa; margin:10px 0;"></p>
            <div id="epContainer"></div>
            <div id="pSec" style="margin-top:15px; display:flex; flex-direction:column; gap:8px;"></div>
            <button class="btn" style="margin-top:10px; background:#444;" onclick="document.getElementById('modal').style.display='none'">بستن</button>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <h3>افزودن محتوا</h3>
        <div class="form-g"><input type="text" id="aTitle" placeholder="عنوان"></div>
        <div class="form-g"><input type="text" id="aPost" placeholder="لینک پوستر"></div>
        <div class="form-g"><input type="text" id="aUrl" placeholder="لینک ویدیو"></div>
        <div class="form-g">
            <select id="aGen"></select>
            <input type="text" id="newG" placeholder="یا ایجاد ژانر جدید..." style="margin-top:5px;">
        </div>
        <div class="form-g"><select id="aType"><option value="movie">سینمایی</option><option value="serial">سریال</option></select></div>
        <button class="btn btn-p" onclick="addM()">ذخیره</button>
        <button class="btn" onclick="document.getElementById('adminPanel').style.display='none'">بستن</button>
    </div>

    <script>
        let genres = JSON.parse(localStorage.getItem('genres')) || ["ایرانی", "خارجی", "ترکی"];
        let movies = JSON.parse(localStorage.getItem('movies')) || [];

        function render() {
            let container = document.getElementById('content');
            container.innerHTML = '';
            genres.forEach(g => {
                let filtered = movies.filter(m => m.genre === g);
                if(filtered.length > 0) {
                    let row = `<div class="row"><div class="row-title">${g}</div><div class="row-grid">`;
                    filtered.forEach(m => {
                        row += `<div class="card" onclick="openM(${m.id})"><img class="poster" src="${m.poster}"><div class="card-body"><b>${m.title}</b></div></div>`;
                    });
                    row += `</div></div>`;
                    container.innerHTML += row;
                }
            });
        }

        function addM() {
            let g = document.getElementById('newG').value.trim();
            if(g && !genres.includes(g)) { genres.push(g); localStorage.setItem('genres', JSON.stringify(genres)); }
            
            movies.push({
                id: Date.now(),
                title: document.getElementById('aTitle').value,
                poster: document.getElementById('aPost').value,
                video: document.getElementById('aUrl').value,
                genre: g || document.getElementById('aGen').value,
                type: document.getElementById('aType').value
            });
            localStorage.setItem('movies', JSON.stringify(movies));
            render();
            alert("ذخیره شد!");
        }

        document.getElementById('logoBtn').addEventListener('click', () => {
            if(prompt("پین مدیریت:") === "1522") {
                document.getElementById('adminPanel').style.display = 'block';
                let s = document.getElementById('aGen');
                s.innerHTML = '';
                genres.forEach(g => s.innerHTML += `<option value="${g}">${g}</option>`);
            }
        });

        function openM(id) {
            let m = movies.find(x => x.id === id);
            document.getElementById('mTitle').innerText = m.title;
            document.getElementById('mDesc').innerText = "ژانر: " + m.genre;
            document.getElementById('pSec').innerHTML = `<a href="${m.video}" class="btn btn-p">پخش آنلاین</a>`;
            document.getElementById('modal').style.display = 'block';
        }
        
        render();
    </script>
</body>
</html>
