<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix | پلتفرم تماشا و دانلود فیلم و سریال</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e50914;
            --background: #141414;
            --surface: #1f1f1f;
            --text: #ffffff;
            --text-muted: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            padding-bottom: 70px;
            overflow-x: hidden;
        }

        /* هدر اصلی سایت */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            transition: background 0.3s;
        }
        header.scrolled {
            background: #000000;
        }

        .logo {
            color: var(--primary);
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

        .user-menu-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            position: relative;
        }

        /* اسلایدر فیلیمو / نتفلیکس */
        .hero-slider {
            position: relative;
            width: 100%;
            height: 70vh;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding: 0 5%;
            transition: background-image 0.5s ease-in-out;
        }
        .hero-slider::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--background), transparent 50%),
                        linear-gradient(to right, rgba(0,0,0,0.6), transparent);
        }
        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 500px;
        }
        .hero-title { font-size: 36px; margin-bottom: 10px; font-weight: bold; }
        .hero-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
        .hero-btns .btn {
            padding: 10px 25px;
            border-radius: 4px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-play { background-color: var(--text); color: #000; }
        .btn-info { background-color: rgba(109, 109, 110, 0.7); color: var(--text); }

        /* لیست فیلم‌ها */
        .main-container { padding: 30px 5%; }
        .section-title { font-size: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        .movie-card {
            background-color: var(--surface);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }
        .movie-card:hover { transform: scale(1.05); }
        .movie-poster { width: 100%; height: 200px; object-fit: cover; }
        .movie-info { padding: 10px; }
        .movie-name { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: 5px; }
        .rating-badge { color: #ffb400; display: flex; align-items: center; gap: 3px; }

        /* مدال جزئیات فیلم، نظرات و امتیازدهی */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            z-index: 2000;
            display: none;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-content {
            background-color: var(--surface);
            max-width: 700px;
            margin: 30px auto;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 15px; left: 15px;
            background: rgba(0,0,0,0.5);
            border: none; color: white;
            width: 35px; height: 35px; border-radius: 50%;
            font-size: 18px; cursor: pointer; z-index: 10;
        }
        .modal-preview { width: 100%; height: 300px; background-size: cover; background-position: center; position: relative; }
        .modal-body { padding: 25px; }
        .player-section { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
        
        /* بخش نظرات و ثبت امتیاز */
        .feedback-section { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .stars-rate { display: flex; gap: 5px; margin: 10px 0; font-size: 22px; cursor: pointer; color: #444; }
        .stars-rate .fa-star.active { color: #ffb400; }
        .comment-box { width: 100%; background: #333; border: none; padding: 10px; color: white; border-radius: 4px; resize: none; margin-bottom: 10px; }
        .comments-list { margin-top: 15px; max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .comment-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 4px; font-size: 13px; }
        .comment-user { font-weight: bold; color: var(--primary); font-size: 12px; margin-bottom: 3px; }

        /* منوی کاربری و سیستم ورود/ثبت‌نام */
        .user-panel {
            position: fixed;
            top: 70px; left: 5%;
            background: var(--surface);
            border-radius: 8px;
            padding: 15px;
            width: 250px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
            z-index: 1500;
        }
        .user-panel input {
            width: 100%; padding: 8px; margin-bottom: 10px;
            background: #333; border: none; color: white; border-radius: 4px;
        }

        /* پنل مدیریت مدرن */
        #adminPanel {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 85vh;
            background-color: #111;
            border-top: 3px solid var(--primary);
            z-index: 3000;
            display: none;
            padding: 25px;
            overflow-y: auto;
        }
        .admin-form-group { margin-bottom: 15px; }
        .admin-form-group label { display: block; margin-bottom: 5px; font-size: 13px; color: var(--text-muted); }
        .admin-form-group input, .admin-form-group select {
            width: 100%; padding: 10px; background: #222; border: 1px solid #333; color: white; border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- هدر سایت -->
    <header id="mainHeader">
        <div class="logo" id="logoBtn">StreamFlix</div>
        <button class="user-menu-btn" id="userMenuBtn"><i class="fa-solid fa-user"></i></button>
    </header>

    <!-- منوی کاربری / ورود و ثبت نام -->
    <div class="user-panel" id="userPanel">
        <div id="authSection">
            <h4 style="margin-bottom: 10px;">ورود / ثبت‌نام</h4>
            <input type="text" id="usernameInput" placeholder="نام کاربری">
            <button class="btn btn-play" style="width:100%; margin:0;" onclick="loginUser()">ورود</button>
        </div>
        <div id="profileSection" style="display: none;">
            <p id="welcomeMsg" style="font-size: 14px; margin-bottom: 10px;"></p>
            <button class="btn btn-info" style="width:100%; margin:0; background: #cc3333;" onclick="logoutUser()">خروج از حساب</button>
        </div>
    </div>

    <!-- اسلایدر اصلی نتفلیکسی -->
    <div class="hero-slider" id="heroSlider">
        <div class="hero-content">
            <h1 class="hero-title" id="heroTitle">بارگذاری...</h1>
            <p class="hero-desc" id="heroDesc">لطفاً شکیبا باشید.</p>
            <div class="hero-btns">
                <button class="btn btn-play" id="heroPlayBtn"><i class="fa-solid fa-play"></i> پخش آنلاین</button>
            </div>
        </div>
    </div>

    <!-- محتوای اصلی و گرید فیلم‌ها -->
    <div class="main-container">
        <div class="section-title"><i class="fa-solid fa-fire" style="color: var(--primary);"></i>برترین فیلم‌ها و سریال‌ها</div>
        <div class="movie-grid" id="movieGrid"></div>
    </div>

    <!-- مدال جزییات و تماشا -->
    <div class="modal" id="movieModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-preview" id="modalPreview"></div>
            <div class="modal-body">
                <h2 id="modalTitle" style="margin-bottom: 10px;"></h2>
                <p id="modalDesc" style="color: var(--text-muted); font-size: 14px; line-height: 1.6;"></p>
                
                <div class="player-section">
                    <button class="btn btn-play" id="directPlayBtn" style="margin:0;"><i class="fa-solid fa-desktop"></i> پخش آنلاین در مرورگر</button>
                    <button class="btn btn-info" id="vlcPlayBtn" style="margin:0; background:#e67e22;"><i class="fa-solid fa-play"></i> پخش در VLC Player</button>
                    <button class="btn btn-info" id="mxPlayBtn" style="margin:0; background:#2980b9;"><i class="fa-solid fa-play"></i> پخش در MX Player</button>
                </div>

                <!-- نظرات و امتیازدهی کاربران -->
                <div class="feedback-section">
                    <h3><i class="fa-solid fa-star" style="color:#ffb400;"></i> امتیاز و نظرات کاربران</h3>
                    <div class="stars-rate" id="ratingStars">
                        <i class="fa-solid fa-star" data-value="1"></i>
                        <i class="fa-solid fa-star" data-value="2"></i>
                        <i class="fa-solid fa-star" data-value="3"></i>
                        <i class="fa-solid fa-star" data-value="4"></i>
                        <i class="fa-solid fa-star" data-value="5"></i>
                    </div>
                    <textarea class="comment-box" id="commentText" rows="3" placeholder="نظر خود را درباره این فیلم بنویسید..."></textarea>
                    <button class="btn btn-play" style="margin:0; padding:8px 20px;" onclick="submitFeedback()">ثبت نظر</button>
                    
                    <div class="comments-list" id="commentsList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- پنل مدیریت مخفی فوق حرفه‌ای -->
    <div id="adminPanel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>🛠️ مدیریت پیشرفته پلتفرم</h2>
            <button class="btn btn-info" style="background:#333;" onclick="closeAdmin()">بستن پنل</button>
        </div>
        <div class="admin-form-group">
            <label>عنوان فیلم / سریال</label>
            <input type="text" id="addTitle" placeholder="مثال: همیشه شادی ۲">
        </div>
        <div class="admin-form-group">
            <label>توضیحات و خلاصه داستان</label>
            <input type="text" id="addDesc" placeholder="خلاصه‌ای از داستان فیلم...">
        </div>
        <div class="admin-form-group">
            <label>لینک پوستر / کاور فیلم</label>
            <input type="text" id="addPoster" placeholder="https://example.com/poster.jpg">
        </div>
        <div class="admin-form-group">
            <label>لینک مستقیم ویدیو (MP4/MKV)</label>
            <input type="text" id="addVideoUrl" placeholder="لینک مستقیم فایل ویدیو">
        </div>
        <div class="admin-form-group">
            <label>ژانر / دسته‌بندی</label>
            <select id="addGenre">
                <option value="کمدی">کمدی</option>
                <option value="اکشن">اکشن</option>
                <option value="هندی دوبله">هندی دوبله</option>
                <option value="درام">درام</option>
            </select>
        </div>
        <button class="btn btn-play" style="width:100%; margin:0; padding:12px;" onclick="addNewMovie()">افزودن به آرشیو سایت</button>
    </div>

    <script>
        // دیتابیس لوکال اولیه (ذخیره در LocalStorage برای ماندگاری اطلاعات)
        let defaultMovies = [
            {
                id: 1,
                title: "همیشه شادی ۲ (دوبله فارسی)",
                desc: "یک فیلم کمدی و سراسر خنده جذاب هند با برترین کیفیت پخش اختصاصی.",
                poster: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500",
                videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4",
                genre: "هندی دوبله",
                rating: 4.8,
                feedbacks: [{user: "علی", comment: "خیلی خنده‌دار و عالی بود دمتون گرم!", rate: 5}]
            }
        ];

        let movies = JSON.parse(localStorage.getItem('stream_movies')) || defaultMovies;
        let currentUser = localStorage.getItem('stream_user') || null;
        let activeMovieId = null;
        let selectedUserRating = 0;

        // سیستم شمارش کلیک برای پنل مدیریت (۴ بار لمس روی لوگو)
        let logoClickCount = 0;
        document.getElementById('logoBtn').addEventListener('click', () => {
            logoClickCount++;
            if (logoClickCount === 4) {
                let pin = prompt("پین‌کد مدیریت را وارد کنید:");
                if (pin === "1522") {
                    document.getElementById('adminPanel').style.display = 'block';
                } else {
                    alert("پین‌کد اشتباه است!");
                }
                logoClickCount = 0;
            }
            setTimeout(() => { logoClickCount = 0; }, 3000); // ریست شمارنده بعد از ۳ ثانیه
        });

        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

        // لود قالب و رندرسازی اطلاعات
        window.addEventListener('DOMContentLoaded', () => {
            renderMovies();
            updateSlider();
            checkUserAuth();
            
            window.addEventListener('scroll', () => {
                if(window.scrollY > 50) document.getElementById('mainHeader').classList.add('scrolled');
                else document.getElementById('mainHeader').classList.remove('scrolled');
            });
        });

        function renderMovies() {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';
            movies.forEach(movie => {
                grid.innerHTML += `
                    <div class="movie-card" onclick="openModal(${movie.id})">
                        <img class="movie-poster" src="${movie.poster}" alt="${movie.title}">
                        <div class="movie-info">
                            <div class="movie-name">${movie.title}</div>
                            <div class="movie-meta">
                                <span>${movie.genre}</span>
                                <span class="rating-badge"><i class="fa-solid fa-star"></i> ${movie.rating}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            localStorage.setItem('stream_movies', JSON.stringify(movies));
        }

        // اسلایدر داینامیک بالای صفحه
        function updateSlider() {
            if(movies.length === 0) return;
            const featured = movies[movies.length - 1]; // آخرین فیلم افزوده شده به عنوان بنر اصلی
            const slider = document.getElementById('heroSlider');
            slider.style.backgroundImage = `url('${featured.poster}')`;
            document.getElementById('heroTitle').innerText = featured.title;
            document.getElementById('heroDesc').innerText = featured.desc;
            document.getElementById('heroPlayBtn').onclick = () => openModal(featured.id);
        }

        // افزودن فیلم جدید توسط ادمین
        function addNewMovie() {
            const title = document.getElementById('addTitle').value;
            const desc = document.getElementById('addDesc').value;
            const poster = document.getElementById('addPoster').value || "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500";
            const videoUrl = document.getElementById('addVideoUrl').value;
            const genre = document.getElementById('addGenre').value;

            if(!title || !videoUrl) { alert("وارد کردن نام فیلم و لینک ویدیو الزامی است."); return; }

            const newMovie = {
                id: Date.now(),
                title, desc, poster, videoUrl, genre,
                rating: 5.0,
                feedbacks: []
            };

            movies.push(newMovie);
            renderMovies();
            updateSlider();
            closeAdmin();
            alert("فیلم جدید با موفقیت به هوم‌پیج اضافه شد و اسلایدر آپدیت گردید!");
        }

        // مدال نمایش جزئیات و راه‌اندازی پلیرها
        function openModal(id) {
            activeMovieId = id;
            const movie = movies.find(m => m.id === id);
            document.getElementById('modalTitle').innerText = movie.title;
            document.getElementById('modalDesc').innerText = movie.desc;
            document.getElementById('modalPreview').style.backgroundImage = `url('${movie.poster}')`;
            
            // لینک‌دهی به پلیرهای خارجی موبایل اندروید
            document.getElementById('directPlayBtn').onclick = () => window.open(movie.videoUrl, '_blank');
            document.getElementById('vlcPlayBtn').onclick = () => window.location.href = `vlc://${movie.videoUrl}`;
            document.getElementById('mxPlayBtn').onclick = () => window.location.href = `intent:${movie.videoUrl}#Intent;package=com.mxtech.videoplayer.ad;end`;
            
            renderFeedbacks(movie);
            resetRatingStars();
            document.getElementById('movieModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('movieModal').style.display = 'none'; }

        // منوی کاربری (ورود و خروج)
        document.getElementById('userMenuBtn').addEventListener('click', () => {
            const panel = document.getElementById('userPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        });

        function checkUserAuth() {
            if(currentUser) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('profileSection').style.display = 'block';
                document.getElementById('welcomeMsg').innerText = `کاربر گرامی، ${currentUser} خوش آمدید`;
            } else {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('profileSection').style.display = 'none';
            }
        }

        function loginUser() {
            const name = document.getElementById('usernameInput').value.trim();
            if(!name) return alert("نام کاربری را وارد کنید");
            currentUser = name;
            localStorage.setItem('stream_user', name);
            checkUserAuth();
            document.getElementById('userPanel').style.display
