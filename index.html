<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix - پلتفرم فیلم و سریال</title>
    <meta name="theme-color" content="#141414">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #141414;
            color: #ffffff;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        header {
            background-color: #090909;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            border-bottom: 1px solid #222;
        }

        .logo {
            color: #E50914;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
        }

        /* بخش اصلی محتوا */
        .container {
            margin-top: 80px;
            padding: 15px;
        }

        .section-title {
            font-size: 18px;
            margin: 20px 0 10px 0;
            color: #E50914;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* کارت‌های فیلم و سریال */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .card {
            background: #1f1f1f;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card-details {
            padding: 10px;
        }

        .card-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 11px;
            color: #b3b3b3;
            display: flex;
            justify-content: space-between;
        }

        /* مودال جزئیات پخش */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            display: none;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-content {
            background: #181818;
            border-radius: 10px;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 20px;
            cursor: pointer;
            color: #fff;
        }

        .modal-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .modal-title { margin-bottom: 10px; }
        .modal-genre { color: #E50914; font-size: 13px; margin-bottom: 10px; }
        .modal-desc { font-size: 13px; color: #cccccc; line-height: 1.6; margin-bottom: 20px; }

        /* باکس انتخاب پلیر و دانلود */
        .action-box {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .select-style {
            width: 100%;
            padding: 10px;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-play { background: #E50914; color: #fff; }
        .btn-download { background: #333; color: #fff; border: 1px solid #555; }

        /* بخش سریال‌ها (انتخاب فصل و قسمت) */
        .series-selector {
            margin-bottom: 15px;
            display: none;
        }

        /* پنل مدیریت مخفی */
        #admin-panel {
            background: #0f0f0f;
            border-top: 2px solid #E50914;
            padding: 20px;
            margin-top: 30px;
            display: none;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
        }

        /* ویدیو پلیر داخلی */
        #internal-player-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 300;
            justify-content: center; align-items: center;
        }

        video { width: 100%; height: auto; }

        .close-player {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.2); padding: 10px;
            border-radius: 50%; cursor: pointer; z-index: 310;
        }
    </style>
</head>
<body>

    <header>
        <!-- کلیک روی لوگو برای ورود به پنل مدیریت با پین کد -->
        <div class="logo" onclick="checkAdminAccess()">StreamFlix <span style="font-size: 10px; color: #555;">●</span></div>
        <div><i class="fas fa-search"></i></div>
    </header>

    <div class="container">
        <h2 class="section-title"><i class="fas fa-film"></i> آرشیو فیلم و سریال‌ها</h2>
        <div class="grid" id="content-grid">
            <!-- آیتم‌ها به صورت دینامیک اینجا اضافه می‌شوند -->
        </div>
        
        <!-- پنل مدیریت مخفی -->
        <div id="admin-panel">
            <h3 style="color: #E50914; margin-bottom: 15px;">پنل مدیریت افزونه مانیتورینگ</h3>
            <div class="form-group">
                <label>نوع محتوا</label>
                <select id="add-type" class="form-control" onchange="toggleFormSeries()">
                    <option value="movie">فیلم سینمایی</option>
                    <option value="series">سریال</option>
                </select>
            </div>
            <div class="form-group">
                <label>عنوان</label>
                <input type="text" id="add-title" class="form-control" placeholder="مثلاً: لئو">
            </div>
            <div class="form-group">
                <label>ژانر</label>
                <input type="text" id="add-genre" class="form-control" placeholder="انیمیشن، کمدی">
            </div>
            <div class="form-group">
                <label>آدرس پوستر (لینک عکس)</label>
                <input type="text" id="add-poster" class="form-control" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>خلاصه داستان</label>
                <textarea id="add-desc" class="form-control" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>لینک ویدیو / لینک قسمت اول</label>
                <input type="text" id="add-url" class="form-control" placeholder="https://.../video.mp4">
            </div>
            <button class="action-btn btn-play" style="width: 100%;" onclick="saveNewContent()">افزودن به لیست</button>
        </div>
    </div>

    <!-- مودال نمایش جزئیات و پخش -->
    <div class="modal" id="media-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></span>
            <img id="modal-img" src="" class="modal-img">
            <h2 id="modal-title" class="modal-title"></h2>
            <div id="modal-genre" class="modal-genre"></div>
            <p id="modal-desc" class="modal-desc"></p>
            
            <!-- بخش انتخاب فصل و قسمت برای سریال ها -->
            <div class="series-selector" id="modal-series-box">
                <select id="series-season" class="select-style">
                    <option value="1">فصل 1</option>
                </select>
                <select id="series-episode" class="select-style">
                    <option value="1">قسمت 1</option>
                    <option value="2">قسمت 2</option>
                    <option value="3">قسمت 3</option>
                </select>
            </div>

            <div class="action-box">
                <label style="font-size: 13px; display:block; margin-bottom:8px;">انتخاب پخش‌کننده:</label>
                <select id="player-select" class="select-style">
                    <option value="internal">پخش‌کننده داخلی (مرورگر)</option>
                    <option value="maxplayer">MX Player (اندروید)</option>
                    <option value="vlc">VLC Player</option>
                </select>
                
                <div class="btn-group">
                    <button class="action-btn btn-play" onclick="playMedia()"><i class="fas fa-play"></i> پخش آنلاین</button>
                    <a id="download-link" href="#" target="_blank" class="action-btn btn-download"><i class="fas fa-download"></i> دانلود فیلم</a>
                </div>
            </div>
        </div>
    </div>

    <!-- پلیر داخلی -->
    <div id="internal-player-container">
        <span class="close-player" onclick="closeInternalPlayer()"><i class="fas fa-arrow-right"></i></span>
        <video id="internal-video" controls></video>
    </div>

    <script>
        // دیتای اولیه نمونه
        let mediaData = [
            {
                id: 1,
                type: 'movie',
                title: 'رنگ شادی ۳',
                genre: 'کمدی، درام | هندی دوبله فارسی',
                poster: 'https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=400',
                desc: 'یک فیلم کمدی و جذاب هندی همراه با صحنه‌های شاد و خانوادگی که به صورت اختصاصی دوبله شده است.',
                url: 'https://www.w3schools.com/html/mov_bbb.mp4'
            },
            {
                id: 2,
                type: 'series',
                title: 'سریال پایتخت',
                genre: 'کمدی، اجتماعی',
                poster: 'https://images.unsplash.com/photo-1618336753974-aae8e04506aa?q=80&w=400',
                desc: 'ماجراهای جذاب و کمدی نقی معمولی و خانواده‌اش در طول فصل‌های مختلف.',
                url: 'https://www.w3schools.com/html/movie.mp4'
            }
        ];

        let currentActiveMedia = null;

        function renderGrid() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            mediaData.forEach(item => {
                grid.innerHTML += `
                    <div class="card" onclick="openModal(${item.id})">
                        <img src="${item.poster}" alt="${item.title}">
                        <div class="card-details">
                            <div class="card-title">${item.title}</div>
                            <div class="card-meta">
                                <span>${item.type === 'movie' ? 'سینمایی' : 'سریال'}</span>
                                <span><i class="fas fa-star" style="color:gold"></i> 8.2</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function openModal(id) {
            const item = mediaData.find(m => m.id === id);
            currentActiveMedia = item;
            
            document.getElementById('modal-img').src = item.poster;
            document.getElementById('modal-title').innerText = item.title;
            document.getElementById('modal-genre').innerText = item.genre;
            document.getElementById('modal-desc').innerText = item.desc;
            document.getElementById('download-link').href = item.url;
            
            const seriesBox = document.getElementById('modal-series-box');
            if(item.type === 'series') {
                seriesBox.style.display = 'block';
                document.getElementById('download-link').innerHTML = '<i class="fas fa-download"></i> دانلود این قسمت';
            } else {
                seriesBox.style.display = 'none';
                document.getElementById('download-link').innerHTML = '<i class="fas fa-download"></i> دانلود فیلم';
            }
            
            document.getElementById('media-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('media-modal').style.display = 'none';
        }

        function playMedia() {
            const playerType = document.getElementById('player-select').value;
            const videoUrl = currentActiveMedia.url;

            if (playerType === 'internal') {
                // پخش کننده داخلی
                document.getElementById('internal-player-container').style.display = 'flex';
                const video = document.getElementById('internal-video');
                video.src = videoUrl;
                video.play();
            } else if (playerType === 'maxplayer') {
                // اینتنت مخصوص MX Player
                window.location.href = `intent:${videoUrl}#Intent;package=com.mxtech.videoplayer.ad;S.title=${encodeURIComponent(currentActiveMedia.title)};end`;
            } else if (playerType === 'vlc') {
                // اینتنت مخصوص VLC
                window.location.href = `vlc://${videoUrl}`;
            }
        }

        function closeInternalPlayer() {
            const video = document.getElementById('internal-video');
            video.pause();
            document.getElementById('internal-player-container').style.display = 'none';
        }

        // پین کد دسترسی مدیریت
        function checkAdminAccess() {
            const pin = prompt("لطفاً پین کد امنیتی را وارد کنید:");
            if (pin === "1522") {
                alert("دسترسی مدیریت تایید شد.");
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('admin-panel').scrollIntoView({ behavior: 'smooth' });
            } else if (pin !== null) {
                alert("پین کد اشتباه است!");
            }
        }

        function toggleFormSeries() {
            const type = document.getElementById('add-type').value;
            // در صورت نیاز به افزودن فیلدهای خاص در فرم مدیریت
        }

        function saveNewContent() {
            const type = document.getElementById('add-type').value;
            const title = document.getElementById('add-title').value;
            const genre = document.getElementById('add-genre').value;
            const poster = document.getElementById('add-poster').value || 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=400';
            const desc = document.getElementById('add-desc').value;
            const url = document.getElementById('add-url').value;

            if(!title || !url) {
                alert("پر کردن عنوان و لینک ویدیو الزامی است.");
                return;
            }

            const newMedia = {
                id: mediaData.length + 1,
                type: type,
                title: title,
                genre: genre,
                poster: poster,
                desc: desc,
                url: url
            };

            mediaData.push(newMedia);
            renderGrid();
            alert("محتوا با موفقیت اضافه شد.");
            
            // ریست فرم
            document.getElementById('add-title').value = '';
            document.getElementById('add-genre').value = '';
            document.getElementById('add-poster').value = '';
            document.getElementById('add-desc').value = '';
            document.getElementById('add-url').value = '';
        }

        // اجرای اولیه
        renderGrid();
    </script>
</body>
</html>
