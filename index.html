<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #e50914; --background: #141414; --surface: #1f1f1f; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--background); color: var(--text); padding-bottom: 30px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #000; position: fixed; top:0; width:100%; z-index:1000; }
        .logo { color: var(--primary); font-size: 22px; font-weight: bold; cursor: pointer; }
        .menu-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }
        .sidebar { position: fixed; top: 0; right: -280px; width: 260px; height: 100vh; background: #111; z-index: 2500; transition: 0.3s; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        .sidebar.active { right: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.6); z-index: 2400; display: none; }
        .user-box { background: var(--surface); padding: 12px; border-radius: 6px; }
        .user-box input { width: 100%; padding: 8px; margin-bottom: 8px; background: #333; border: none; color: white; border-radius: 4px; }
        .btn { padding: 8px 15px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
        .btn-p { background: var(--primary); color: white; }
        .btn-i { background: #555; color: white; }
        .hero { position: relative; width: 100%; height: 50vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 20px; margin-top: 60px; }
        .hero::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, var(--background), transparent); }
        .hero-c { position: relative; z-index: 2; }
        .main { padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-top: 10px; }
        .card { background: var(--surface); border-radius: 6px; overflow: hidden; cursor: pointer; }
        .poster { width: 100%; height: 170px; object-fit: cover; }
        .card-body { padding: 8px; font-size: 13px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; overflow-y: auto; padding: 15px; }
        .modal-c { background: var(--surface); max-width: 500px; margin: 50px auto; border-radius: 8px; padding: 15px; position: relative; }
        .close { position: absolute; top: 10px; left: 10px; background: #000; border: none; color: white; width: 30px; height: 30px; border-radius: 50%; font-size: 16px; }
        .p-sec { margin: 15px 0; display: flex; flex-direction: column; gap: 8px; }
        .feed-sec { margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
        .stars { display: flex; gap: 5px; margin: 8px 0; font-size: 20px; color: #444; cursor: pointer; }
        .stars .fa-star.active { color: #ffb400; }
        #adminPanel { position: fixed; bottom: 0; left: 0; width: 100%; height: 80vh; background: #111; border-top: 2px solid var(--primary); z-index: 3000; display: none; padding: 20px; overflow-y: auto; }
        .form-g { margin-bottom: 12px; }
        .form-g label { display: block; font-size: 12px; margin-bottom: 4px; }
        .form-g input, .form-g select { width: 100%; padding: 8px; background: #222; border: 1px solid #333; color: white; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <button class="menu-btn" id="openMenu"><i class="fa-solid fa-bars"></i></button>
            <div class="logo" id="logoBtn">StreamFlix</div>
        </div>
    </header>

    <div class="sidebar-overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <button class="menu-btn" id="closeMenu" style="font-size:16px; text-align:right;"><i class="fa-solid fa-xmark"></i> بستن منو</button>
        <div class="user-box">
            <div id="authSec">
                <h5 style="margin-bottom:8px;">ورود / عضویت</h5>
                <input type="text" id="userInput" placeholder="نام کاربری...">
                <button class="btn btn-p" style="width:100%;" onclick="login()">ورود</button>
            </div>
            <div id="profSec" style="display:none;">
                <p id="welcome" style="font-size:12px; margin-bottom:8px; color:#2ecc71;"></p>
                <button class="btn btn-p" style="width:100%; background:#c33;" onclick="logout()">خروج</button>
            </div>
        </div>
    </div>

    <div class="hero" id="hero">
        <div class="hero-c">
            <h2 id="heroT">بارگذاری...</h2>
            <button class="btn btn-p" id="heroBtn" style="margin-top:10px;"><i class="fa-solid fa-play"></i> تماشا</button>
        </div>
    </div>

    <div class="main">
        <h4><i class="fa-solid fa-fire" style="color:var(--primary); margin-left:5px;"></i>فیلم‌های پیشنهادی</h4>
        <div class="grid" id="grid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-c">
            <button class="close" onclick="closeM()"><i class="fa-solid fa-xmark"></i></button>
            <h3 id="mTitle" style="margin-bottom:10px;"></h3>
            <p id="mDesc" style="font-size:13px; color:#aaa; line-height:1.5;"></p>
            <div class="p-sec">
                <button class="btn btn-p" id="p1"><i class="fa-solid fa-desktop"></i> پخش مستقیم</button>
                <button class="btn btn-i" id="p2" style="background:#e67e22;"><i class="fa-solid fa-play"></i> پخش در VLC</button>
                <button class="btn btn-i" id="p3" style="background:#2980b9;"><i class="fa-solid fa-play"></i> پخش در MX Player</button>
            </div>
            <div class="feed-sec">
                <h5>ثبت امتیاز و نظر</h5>
                <div class="stars" id="stars">
                    <i class="fa-solid fa-star" data-v="1"></i><i class="fa-solid fa-star" data-v="2"></i><i class="fa-solid fa-star" data-v="3"></i><i class="fa-solid fa-star" data-v="4"></i><i class="fa-solid fa-star" data-v="5"></i>
                </div>
                <input type="text" id="commIn" placeholder="نظر شما..." style="width:100%; padding:8px; background:#333; border:none; color:white; margin-bottom:8px; border-radius:4px;">
                <button class="btn btn-p" onclick="addComm()">ثبت</button>
                <div id="commList" style="margin-top:10px; max-height:120px; overflow-y:auto; font-size:12px; display:flex; flex-direction:column; gap:6px;"></div>
            </div>
        </div>
    </div>

    <div id="adminPanel">
        <div style="display:flex; justify-content:between; align-items:center; margin-bottom:15px;">
            <h3>🛠️ افزودن فیلم جدید</h3>
            <button class="btn btn-i" onclick="closeA()">بستن</button>
        </div>
        <div class="form-g"><label>عنوان</label><input type="text" id="aTitle"></div>
        <div class="form-g"><label>توضیحات</label><input type="text" id="aDesc"></div>
        <div class="form-g"><label>کاور (لینک عکس)</label><input type="text" id="aPost"></div>
        <div class="form-g"><label>لینک مستقیم ویدیو</label><input type="text" id="aUrl"></div>
        <div class="form-g"><label>ژانر</label><select id="aGen"><option value="هندی دوبله">هندی دوبله</option><option value="کمدی">کمدی</option></select></div>
        <button class="btn btn-p" style="width:100%; padding:10px;" onclick="addMovie()">ذخیره فیلم</button>
    </div>

    <script>
        let def = [{id:1,title:"همیشه شادی ۲ (دوبله فارسی)",desc:"فیلم کمدی و سراسر خنده جذاب هند با کیفیت عالی.",poster:"https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500",videoUrl:"https://www.w3schools.com/html/mov_bbb.mp4",genre:"هندی دوبله",rating:4.8,feedbacks:[]}];
        let movies = JSON.parse(localStorage.getItem('m_list')) || def;
        let user = localStorage.getItem('m_user') || null;
        let activeId = null, curRate = 0, lClick = 0;

        const sb = document.getElementById('sidebar'), ov = document.getElementById('overlay');
        document.getElementById('openMenu').addEventListener('click', () => { sb.classList.add('active'); ov.style.display='block'; });
        const closeMenu = () => { sb.classList.remove('active'); ov.style.display='none'; };
        document.getElementById('closeMenu').addEventListener('click', closeMenu);
        ov.addEventListener('click', closeMenu);

        document.getElementById('logoBtn').addEventListener('click', () => {
            lClick++;
            if (lClick === 4) {
                if (prompt("پین‌کد مدیریت:") === "1522") { document.getElementById('adminPanel').style.display = 'block'; closeMenu(); }
                else alert("خطا!");
                lClick = 0;
            }
            setTimeout(() => { lClick = 0; }, 3000);
        });
        const closeA = () => document.getElementById('adminPanel').style.display='none';

        window.addEventListener('DOMContentLoaded', () => { render(); auth(); });

        function render() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            movies.forEach(m => {
                g.innerHTML += `<div class="card" onclick="openM(${m.id})"><img class="poster" src="${m.poster}"><div class="card-body"><b>${m.title}</b><br><span style="color:#aaa; font-size:11px;">${m.genre}</span> <span style="color:#ffb400; float:left;"><i class="fa-solid fa-star"></i> ${m.rating}</span></div></div>`;
            });
            localStorage.setItem('m_list', JSON.stringify(movies));
            if(movies.length > 0) {
                let f = movies[movies.length-1];
                document.getElementById('hero').style.backgroundImage = `url('${f.poster}')`;
                document.getElementById('heroT').innerText = f.title;
                document.getElementById('heroBtn').onclick = () => openM(f.id);
            }
        }

        function addMovie() {
            let t = document.getElementById('aTitle').value, d = document.getElementById('aDesc').value, p = document.getElementById('aPost').value, u = document.getElementById('aUrl').value, g = document.getElementById('aGen').value;
            if(!t || !u) return alert("فیلدها را پر کنید");
            movies.push({id:Date.now(), title:t, desc:d, poster:p||"https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500", videoUrl:u, genre:g, rating:5.0, feedbacks:[]});
            render(); closeA(); alert("افزوده شد!");
        }

        function openM(id) {
            activeId = id; let m = movies.find(x => x.id === id);
            document.getElementById('mTitle').innerText = m.title;
            document.getElementById('mDesc').innerText = m.desc;
            document.getElementById('p1').onclick = () => window.open(m.videoUrl, '_blank');
            document.getElementById('p2').onclick = () => window.location.href = `vlc://${m.videoUrl}`;
            document.getElementById('p3').onclick = () => window.location.href = `intent:${m.videoUrl}#Intent;package=com.mxtech.videoplayer.ad;end`;
            refFeed(m); resetStars();
            document.getElementById('modal').style.display = 'block';
        }
        const closeM = () => document.getElementById('modal').style.display='none';

        function auth() {
            if(user) { document.getElementById('authSec').style.display='none'; document.getElementById('profSec').style.display='block'; document.getElementById('welcome').innerText = `خوش آمدید ${user}`; }
            else { document.getElementById('authSec').style.display='block'; document.getElementById('profSec').style.display='none'; }
        }
        function login() { let n = document.getElementById('userInput').value.trim(); if(!n) return alert("نام؟"); user = n; localStorage.setItem('m_user', n); auth(); closeMenu(); }
        function logout() { localStorage.removeItem('m_user'); user = null; auth(); closeMenu(); }

        const st = document.querySelectorAll('#stars i');
        st.forEach(s => { s.addEventListener('click', (e) => { curRate = parseInt(e.target.getAttribute('data-v')); st.forEach((x,i) => i < curRate ? x.classList.add('active'):x.classList.remove('active')); }); });
        function resetStars() { curRate = 0; st.forEach(x => x.classList.remove('active')); document.getElementById('commIn').value=''; }

        function refFeed(m) {
            const c = document.getElementById('commList'); c.innerHTML = '';
            if(!m.feedbacks || m.feedbacks.length===0) { c.innerHTML='<p style="color:#666;">بدون نظر</p>'; return; }
            m.feedbacks.forEach(f => c.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:6px; border-radius:4px;"><b>${f.user}:</b> ${f.txt} <span style="color:#ffb400; float:left;">${f.r}</span></div>`);
        }

        function addComm() {
            if(!user) return alert("ابتدا وارد شوید"); if(curRate===0) return alert("امتیاز بدهید");
            let t = document.getElementById('commIn').value.trim(); if(!t) return alert("متن؟");
            let m = movies.find(x => x.id === activeId);
            m.feedbacks.push({user:user, txt:t, r:curRate});
            m.rating = (m.feedbacks.reduce((a,b)=>a+b.r,0)/m.feedbacks.length).toFixed(1);
            render(); refFeed(m); resetStars(); alert("ثبت شد!");
        }
    </script>
</body>
</html>
